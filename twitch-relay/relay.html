<!DOCTYPE html>
<!--
  Twitch Relay Page
  ================
  このファイルを GitHub Pages 等に配置し、拡張機能の「relay URL」に設定してください。

  通信方式:
    popup モード: window.open() で開いた場合 → window.opener と通信
    iframe モード: iframe で埋め込んだ場合   → window.parent と通信（後方互換）

  postMessage プロトコル:
    ホスト → relay:  { type: 'seek',           data: { time: number } }
    ホスト → relay:  { type: 'getCurrentTime' }
    ホスト → relay:  { type: 'play' }
    ホスト → relay:  { type: 'pause' }
    relay → ホスト:  { type: 'twitchReady' }
    relay → ホスト:  { type: 'currentTime',    data: { time: number } }
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Relay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player, #player > iframe { width: 100% !important; height: 100% !important; border: none; display: block; }
    #error {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      color: #f87171; font-family: system-ui, sans-serif; font-size: 14px;
      background: #0f0f13; text-align: center; padding: 16px;
    }
    #error.show { display: flex; }
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="error"></div>

  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    const params   = new URLSearchParams(location.search);
    const channel  = params.get('channel');
    const video    = params.get('video');
    const parent   = params.get('parent') || location.hostname || 'localhost';
    const isMuted  = params.get('muted') === '1';

    // popup モード: window.open() で開かれた場合は window.opener と通信
    // iframe モード: iframe 埋め込みの場合は window.parent と通信
    const isPopup = Boolean(window.opener) && window.parent === window;
    const host    = isPopup ? window.opener : window.parent;

    function sendToHost(msg) {
      host?.postMessage(msg, '*');
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }

    if (!channel && !video) {
      showError('URL パラメータ "channel" または "video" が必要です');
    } else if (typeof Twitch === 'undefined') {
      showError('Twitch Embed スクリプトのロードに失敗しました');
    } else {
      const options = {
        width:    '100%',
        height:   '100%',
        autoplay: false,
        muted:    isMuted,
        parent:   [parent],
      };
      if (channel) options.channel = channel;
      else         options.video   = String(video).replace(/^v/, '');

      const player = new Twitch.Player('player', options);

      player.addEventListener(Twitch.Player.READY, () => {
        sendToHost({ type: 'twitchReady' });
      });

      window.addEventListener('message', (e) => {
        if (e.source !== host) return;
        const { type, data } = e.data || {};
        switch (type) {
          case 'seek':
            player.seek(Math.max(0, data?.time ?? 0));
            break;
          case 'getCurrentTime':
            sendToHost({ type: 'currentTime', data: { time: player.getCurrentTime() } });
            break;
          case 'play':   player.play();             break;
          case 'pause':  player.pause();            break;
          case 'mute':   player.setMuted(true);     break;
          case 'unmute': player.setMuted(false);    break;
        }
      });
    }
  </script>
</body>
</html>
