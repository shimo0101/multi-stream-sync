<!DOCTYPE html>
<!--
  YouTube Relay Page
  ==================
  このファイルをローカルサーバーまたは静的ホスティング（GitHub Pages 等）に配置し、
  拡張機能の「YouTube relay URL」フィールドにそのURLを入力してください。

  ローカルテスト（プロジェクトフォルダで）:
    python -m http.server 8080
    → relay URL: http://localhost:8080/youtube-relay/relay.html

  URL パラメータ:
    v = YouTube 動画ID

  通信プロトコル (postMessage):
    relay → 親: { type: 'ytReady' }
    relay → 親: { type: 'ytCurrentTime', data: { time: number } }
    relay → 親: { type: 'ytStateChange', data: number }
    親 → relay: { type: 'ytSeek',  data: { time: number } }
    親 → relay: { type: 'ytPlay' }
    親 → relay: { type: 'ytPause' }
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube Relay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player > iframe { width: 100% !important; height: 100% !important; border: none; display: block; }
    #error {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      color: #f87171; font-family: system-ui, sans-serif; font-size: 14px;
      background: #0f0f13; text-align: center; padding: 16px;
    }
    #error.show { display: flex; }
  </style>
</head>
<body>
  <div id="player" style="width:100%;height:100%;"></div>
  <div id="error"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    const params   = new URLSearchParams(location.search);
    const videoId  = params.get('v');
    const isMuted  = params.get('muted') === '1';

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }

    window.onYouTubeIframeAPIReady = function() {
      if (!videoId) { showError('URL パラメータ "v"（動画ID）が必要です'); return; }

      player = new YT.Player('player', {
        videoId,
        width:  '100%',
        height: '100%',
        playerVars: { controls: 1, rel: 0, autoplay: 0, playsinline: 1 },
        events: {
          onReady() {
            if (isMuted) player.mute();
            window.parent.postMessage({ type: 'ytReady' }, '*');
            // 500ms ごとに現在位置を親へ送信
            setInterval(() => {
              if (!player || !player.getCurrentTime) return;
              window.parent.postMessage(
                { type: 'ytCurrentTime', data: { time: player.getCurrentTime() } }, '*'
              );
            }, 500);
          },
          onStateChange(e) {
            window.parent.postMessage({ type: 'ytStateChange', data: e.data }, '*');
          },
          onError(e) {
            showError(`YouTube エラー: ${e.data}`);
          },
        },
      });
    };

    window.addEventListener('message', (e) => {
      if (!player) return;
      if (e.source !== window.parent) return; // 埋め込み元（ダッシュボード）以外からの操作を無視
      const { type, data } = e.data || {};
      switch (type) {
        case 'ytSeek':      player.seekTo(Math.max(0, data?.time ?? 0), true); break;
        case 'ytPlay':      player.playVideo();  break;
        case 'ytPause':     player.pauseVideo(); break;
        case 'ytMute':      player.mute();       break;
        case 'ytUnmute':    player.unMute();     break;
        case 'ytSetVolume': player.setVolume(Math.max(0, Math.min(100, data?.volume ?? 100))); break;
      }
    });
  </script>
</body>
</html>
