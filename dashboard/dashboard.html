<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiStream Sync</title>
  <link rel="stylesheet" href="dashboard.css?v=3">
</head>
<body>

  <header class="topbar">
    <h1 class="app-title">MultiStream Sync</h1>
    <div class="topbar-controls">
      <button id="btn-panel-remove" class="btn btn--secondary" title="パネルを削除">－</button>
      <button id="btn-panel-add"    class="btn btn--secondary" title="パネルを追加">＋</button>
      <select id="sel-layout"   class="topbar-select" title="レイアウトを選択"></select>
      <button id="btn-fullscreen" class="btn btn--settings" title="全画面モード (F キー)">全画面</button>
      <button id="btn-settings" class="btn btn--settings" title="共通設定を開く">⚙</button>
      <select id="sel-sync-ref" class="topbar-select" title="同期の基準パネル"></select>
      <button id="btn-sync"     class="btn btn--primary">⏱ 同期</button>
    </div>
  </header>

  <!-- 共通設定パネル（⚙ で開閉） -->
  <section class="global-settings" id="global-settings" hidden aria-label="共通設定">
    <div class="settings-grid">
      <div class="settings-item">
        <label class="config-label" for="yt-api-key">YouTube API Key</label>
        <input type="password" id="yt-api-key" class="input"
               placeholder="YouTube Data API v3 キー" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="yt-relay-url">YouTube relay URL</label>
        <input type="text" id="yt-relay-url" class="input"
               placeholder="http://localhost:8080/youtube-relay/relay.html"
               autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-parent">Twitch parent</label>
        <input type="text" id="tw-parent" class="input input--sm"
               placeholder="localhost" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-relay-url">Twitch relay URL</label>
        <input type="text" id="tw-relay-url" class="input"
               placeholder="https://…/twitch-relay/relay.html" autocomplete="off">
      </div>
    </div>
    <p class="settings-note">
      YouTube: <code>python -m http.server 8080</code> でローカルサーバーを起動し relay URL を設定。
      Twitch: relay.html を外部ドメインに配置するか、parent にホスト名を指定。
    </p>
  </section>

  <!-- 全画面解除ボタン（全画面時のみ表示） -->
  <button id="btn-exit-fullscreen" class="btn--exit-fullscreen" title="全画面解除 (Esc)">✕</button>

  <main class="stage" id="stage">
    <!-- パネルは dashboard.js が動的に生成 -->
  </main>

  <footer class="statusbar">
    <span id="status-msg">プレイヤーを読み込んでください</span>
  </footer>

  <script type="module" src="dashboard.js?v=3"></script>
</body>
</html>
