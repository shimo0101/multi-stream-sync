<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiStream Sync</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <header class="topbar">
    <h1 class="app-title">MultiStream Sync</h1>
    <div class="topbar-controls">
      <button id="btn-layout"   class="btn btn--secondary">↕ 縦並び</button>
      <button id="btn-settings" class="btn btn--settings"  title="共通設定を開く">⚙</button>
      <button id="btn-sync-dir" class="btn btn--sync-dir"  title="同期方向を切替">1→2</button>
      <button id="btn-sync"     class="btn btn--primary">⏱ 同期</button>
    </div>
  </header>

  <!-- 共通設定パネル（⚙ で開閉） -->
  <section class="global-settings" id="global-settings" hidden aria-label="共通設定">
    <div class="settings-grid">
      <div class="settings-item">
        <label class="config-label" for="yt-api-key">YouTube API Key</label>
        <input type="password" id="yt-api-key" class="input"
               placeholder="YouTube Data API v3 キー" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="yt-relay-url">YouTube relay URL</label>
        <input type="text" id="yt-relay-url" class="input"
               placeholder="http://localhost:8080/youtube-relay/relay.html"
               autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-parent">Twitch parent</label>
        <input type="text" id="tw-parent" class="input input--sm"
               placeholder="localhost" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-relay-url">Twitch relay URL</label>
        <input type="text" id="tw-relay-url" class="input"
               placeholder="https://…/twitch-relay/relay.html" autocomplete="off">
      </div>
    </div>
    <p class="settings-note">
      YouTube: <code>python -m http.server 8080</code> でローカルサーバーを起動し relay URL を設定。
      Twitch: relay.html を外部ドメインに配置するか、parent にホスト名を指定。
    </p>
  </section>

  <main class="stage" id="stage">

    <!-- ===== パネル 0 (左) ===== -->
    <section class="panel" id="panel-0" aria-label="プレイヤー 1">
      <div class="panel-config">

        <!-- プラットフォーム選択 + URL + 読込 -->
        <div class="config-row">
          <div class="platform-switch" data-panel="0">
            <button class="plat-btn plat-btn--yt active" data-platform="youtube">YouTube</button>
            <button class="plat-btn plat-btn--tw"        data-platform="twitch">Twitch</button>
          </div>
          <input type="text" id="url-0" class="input input--url"
                 placeholder="URL を入力（自動判別）" autocomplete="off">
          <button id="btn-load-0" class="btn btn--load">読込</button>
        </div>

        <!-- 配信開始時刻 + 自動取得 + 微調整 -->
        <div class="config-row">
          <label class="config-label" for="start-0">配信開始</label>
          <input type="text" id="start-0" class="input input--time"
                 placeholder="HH:MM:SS" inputmode="numeric">
          <button id="btn-fetch-0" class="btn btn--fetch" title="YouTube APIから自動取得">⬇ 自動</button>
          <div class="finetune-group" aria-label="開始時刻の微調整">
            <button class="btn btn--ft" data-panel="0" data-delta="-5">−5s</button>
            <button class="btn btn--ft" data-panel="0" data-delta="-1">−1s</button>
            <button class="btn btn--ft" data-panel="0" data-delta="1">+1s</button>
            <button class="btn btn--ft" data-panel="0" data-delta="5">+5s</button>
          </div>
        </div>

        <!-- チャット -->
        <div class="config-row">
          <button id="btn-chat-0" class="btn btn--chat" disabled>チャット開始</button>
          <span id="chat-hint-0" class="hint"></span>
        </div>

      </div>
      <div class="player-wrap">
        <div id="player-0" class="player-target"></div>
        <canvas id="canvas-0" class="comment-layer" aria-hidden="true"></canvas>
      </div>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <!-- ===== パネル 1 (右) ===== -->
    <section class="panel" id="panel-1" aria-label="プレイヤー 2">
      <div class="panel-config">

        <div class="config-row">
          <div class="platform-switch" data-panel="1">
            <button class="plat-btn plat-btn--yt"        data-platform="youtube">YouTube</button>
            <button class="plat-btn plat-btn--tw active" data-platform="twitch">Twitch</button>
          </div>
          <input type="text" id="url-1" class="input input--url"
                 placeholder="URL を入力（自動判別）" autocomplete="off">
          <button id="btn-load-1" class="btn btn--load">読込</button>
        </div>

        <div class="config-row">
          <label class="config-label" for="start-1">配信開始</label>
          <input type="text" id="start-1" class="input input--time"
                 placeholder="HH:MM:SS" inputmode="numeric">
          <button id="btn-fetch-1" class="btn btn--fetch" title="YouTube APIから自動取得" hidden>⬇ 自動</button>
          <div class="finetune-group" aria-label="開始時刻の微調整">
            <button class="btn btn--ft" data-panel="1" data-delta="-5">−5s</button>
            <button class="btn btn--ft" data-panel="1" data-delta="-1">−1s</button>
            <button class="btn btn--ft" data-panel="1" data-delta="1">+1s</button>
            <button class="btn btn--ft" data-panel="1" data-delta="5">+5s</button>
          </div>
        </div>

        <div class="config-row">
          <button id="btn-chat-1" class="btn btn--chat" disabled>チャット開始</button>
          <span id="chat-hint-1" class="hint">匿名接続 · API Key 不要</span>
        </div>

      </div>
      <div class="player-wrap">
        <div id="player-1" class="player-target"></div>
        <canvas id="canvas-1" class="comment-layer" aria-hidden="true"></canvas>
      </div>
    </section>

  </main>

  <footer class="statusbar">
    <span id="status-msg">プレイヤーを読み込んでください</span>
  </footer>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
