<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MultiStream">
  <link rel="apple-touch-icon" href="../icons/icon-96.png">
  <link rel="manifest" href="pwa.webmanifest">
  <title>MultiStream Sync</title>
  <link rel="stylesheet" href="dashboard.css?v=20">
</head>
<body>

  <header class="topbar">
    <h1 class="app-title">MultiStream Sync</h1>
    <div class="topbar-controls">
      <button id="btn-panel-remove"  class="btn btn--secondary" title="パネルを削除">－</button>
      <button id="btn-panel-add"     class="btn btn--secondary" title="パネルを追加">＋</button>
      <button id="btn-order-reset"   class="btn btn--secondary" title="パネルの並び順をリセット（P1→左・上）">↺</button>
      <select id="sel-layout"   class="topbar-select" title="レイアウトを選択"></select>
      <button id="btn-load-all"  class="btn btn--secondary" title="すべてのパネルを読み込む">全読込</button>
      <button id="btn-chat-all"  class="btn btn--secondary" title="すべてのパネルのチャットを開始">全チャット</button>
      <span class="tb-break"></span>
      <button id="btn-fullscreen" class="btn btn--settings" title="全画面モード (F キー)">全画面</button>
      <button id="btn-native-fs" class="btn btn--settings" title="ブラウザ全画面（アドレスバーを非表示）">⛶</button>
      <button id="btn-browser"   class="btn btn--settings" title="チャンネルブラウザ">チャンネル</button>
      <button id="btn-settings" class="btn btn--settings" title="共通設定を開く">⚙</button>
      <select id="sel-sync-ref" class="topbar-select" title="同期の基準パネル"></select>
      <button id="btn-sync"     class="btn btn--primary">⏱ 同期</button>
    </div>
  </header>

  <!-- 共通設定パネル（⚙ で開閉） -->
  <section class="global-settings" id="global-settings" hidden aria-label="共通設定">
    <div class="settings-grid">
      <div class="settings-item">
        <label class="config-label" for="yt-api-key">YouTube API Key</label>
        <input type="password" id="yt-api-key" class="input"
               placeholder="YouTube Data API v3 キー" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="yt-relay-url">YouTube relay URL</label>
        <input type="text" id="yt-relay-url" class="input"
               placeholder="http://localhost:8080/youtube-relay/relay.html"
               autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-parent">Twitch parent</label>
        <input type="text" id="tw-parent" class="input input--sm"
               placeholder="localhost" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-relay-url">Twitch relay URL</label>
        <input type="text" id="tw-relay-url" class="input"
               placeholder="https://…/twitch-relay/relay.html" autocomplete="off">
      </div>
      <div class="settings-item">
        <label class="config-label" for="tw-client-id">Twitch Client ID</label>
        <input type="text" id="tw-client-id" class="input input--sm"
               placeholder="dev.twitch.tv で取得" autocomplete="off">
      </div>
    </div>
    <p class="settings-note">
      YouTube: <code>python -m http.server 8080</code> でローカルサーバーを起動し relay URL を設定。
      Twitch: relay.html を外部ドメインに配置するか、parent にホスト名を指定。
    </p>
  </section>

  <!-- 全画面解除ボタン（全画面時のみ表示） -->
  <button id="btn-exit-fullscreen" class="btn--exit-fullscreen" title="全画面解除 (Esc)">✕</button>

  <main class="stage" id="stage">
    <!-- パネルは dashboard.js が動的に生成 -->
  </main>

  <footer class="statusbar">
    <span id="status-msg">プレイヤーを読み込んでください</span>
  </footer>

  <!-- チャンネルブラウザ サイドバー -->
  <aside class="channel-browser" id="channel-browser">
    <div class="cb-header">
      <span class="cb-title">チャンネル</span>
      <button id="btn-cb-share" class="cb-share-btn" title="チャンネル一覧を他のデバイスに送る">📤</button>
      <button id="btn-cb-close" class="cb-close">✕</button>
    </div>
    <div class="cb-share-panel" id="cb-share-panel" hidden>
      <p class="cb-share-hint">以下の URL を Android で開くとチャンネルが取り込まれます</p>
      <div class="cb-share-url-row">
        <code class="cb-share-url-text" id="cb-share-url-text"></code>
        <button id="btn-cb-copy" class="btn btn--secondary">コピー</button>
      </div>
    </div>
    <div class="cb-tabs">
      <button class="cb-tab cb-tab--active" data-cb-tab="youtube">YouTube</button>
      <button class="cb-tab" data-cb-tab="twitch">Twitch</button>
    </div>
    <!-- チャンネルブラウザ内ステータス（モバイル用） -->
    <div class="cb-status-bar" id="cb-status-bar" hidden></div>
    <div class="cb-pane" id="cb-pane-youtube">
      <div class="cb-add-row">
        <input id="cb-yt-input" class="input" placeholder="@ハンドル または チャンネルID">
        <button id="cb-yt-add" class="btn btn--primary">追加</button>
      </div>
      <div class="cb-action-row">
        <button id="cb-yt-refresh" class="btn btn--secondary">ライブ確認</button>
        <button id="cb-yt-picker"  class="btn btn--secondary">動画を探す ↗</button>
      </div>
      <ul class="cb-list" id="cb-yt-list"></ul>
    </div>
    <div class="cb-pane cb-pane--hidden" id="cb-pane-twitch">
      <div class="cb-add-row">
        <input id="cb-tw-input" class="input" placeholder="チャンネル名">
        <button id="cb-tw-add" class="btn btn--primary">追加</button>
      </div>
      <div class="cb-action-row">
        <button id="cb-tw-live"    class="btn btn--secondary">ライブ確認</button>
        <button id="cb-tw-refresh" class="btn btn--secondary">アイコン更新</button>
        <button id="cb-tw-picker"  class="btn btn--secondary">チャンネルを探す ↗</button>
      </div>
      <ul class="cb-list" id="cb-tw-list"></ul>
    </div>
  </aside>

  <script type="module" src="dashboard.js?v=20"></script>
</body>
</html>
