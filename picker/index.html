<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画を探す — MultiStream Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* ===== Sticky header ===== */
    .picker-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
      padding: 12px 16px 10px;
    }

    .header-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    h1 { font-size: 16px; font-weight: 700; color: #a78bfa; letter-spacing: 0.02em; }

    #api-status { font-size: 11px; color: #6b7280; }
    #api-status.ok  { color: #4ade80; }
    #api-status.err { color: #f87171; }

    /* ===== Platform tabs ===== */
    .platform-tabs {
      display: flex;
      margin-bottom: 10px;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid #3a3a5a;
      width: fit-content;
    }

    .platform-tab {
      padding: 6px 20px;
      background: transparent;
      border: none;
      font-size: 13px; font-weight: 700;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.12s;
    }
    .platform-tab:hover { color: #c4b5fd; background: #1a1a2a; }
    .platform-tab[data-ptab="youtube"].is-active { background: #cc0000; color: #fff; }
    .platform-tab[data-ptab="twitch"].is-active  { background: #6441a5; color: #fff; }

    /* ===== Search row ===== */
    .search-row { display: flex; gap: 6px; align-items: center; }

    .search-input {
      flex: 1;
      background: #1a1a2a;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-size: 14px;
      transition: border-color 0.12s;
    }
    .search-input:focus { outline: none; }
    #q:focus         { border-color: #cc0000; }
    #tw-filter:focus { border-color: #6441a5; }
    #tw-vod-url:focus { border-color: #6441a5; }

    .btn-yt-search {
      background: #cc0000; color: #fff;
      border: none; border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: background 0.12s;
    }
    .btn-yt-search:hover:not(:disabled) { background: #aa0000; }
    .btn-yt-search:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Channel filter chips (YouTube) ===== */
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px;
      background: #1a1a2a; border: 1px solid #3a3a5a; border-radius: 20px;
      font-size: 12px; color: #9ca3af;
      cursor: pointer; transition: all 0.12s; white-space: nowrap;
    }
    .chip:hover { background: #2a2a3a; color: #e0e0e0; }
    .chip.is-active { background: #2a0a0a; border-color: #cc0000; color: #fca5a5; }
    .chip-all.is-active { background: #0a2a0a; border-color: #16a34a; color: #86efac; }

    .chip-avatar { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }

    /* ===== Video type filter row (YouTube) ===== */
    .filter-row {
      display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid #1e1e2a;
    }

    .filter-label { font-size: 11px; color: #4b5563; white-space: nowrap; margin-right: 2px; }

    .filter-btn {
      padding: 3px 11px;
      background: #1a1a2a; border: 1px solid #3a3a5a; border-radius: 5px;
      font-size: 12px; font-weight: 600; color: #6b7280;
      cursor: pointer; transition: all 0.12s; white-space: nowrap;
    }
    .filter-btn:hover { background: #2a2a3a; color: #c4b5fd; border-color: #4a4a6a; }
    .filter-btn.is-active                        { background: #1e1a3a; border-color: #7c3aed; color: #c4b5fd; }
    .filter-btn[data-filter="live"].is-active    { background: #2a0a0a; border-color: #dc2626; color: #fca5a5; }
    .filter-btn[data-filter="short"].is-active   { background: #0a1a2a; border-color: #2563eb; color: #93c5fd; }

    /* ===== Twitch header note ===== */
    .tw-note {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid #1e1e2a;
      font-size: 11px; color: #4b5563; line-height: 1.6;
    }

    /* ===== Main content ===== */
    main { padding: 16px; max-width: 960px; margin: 0 auto; }

    .hint-text {
      color: #4b5563; font-size: 13px;
      padding: 40px 0; text-align: center; line-height: 1.8;
    }

    .api-warning {
      background: #1a1500; border: 1px solid #854d0e; border-radius: 8px;
      padding: 16px 20px; color: #fde68a; font-size: 13px; line-height: 1.8; margin-bottom: 16px;
    }
    .api-warning code {
      background: #2a2500; border: 1px solid #854d0e;
      border-radius: 3px; padding: 1px 5px; font-size: 12px;
    }

    .loading-text { text-align: center; padding: 40px; color: #4b5563; font-size: 13px; }

    .error-text {
      background: #1a0a0a; border: 1px solid #7f1d1d; border-radius: 8px;
      padding: 14px 18px; color: #fca5a5; font-size: 13px;
    }

    /* ===== YouTube video grid ===== */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .video-grid.is-shorts { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .video-grid.is-shorts .video-thumb { aspect-ratio: 9 / 16; }

    .video-card {
      display: flex; flex-direction: column;
      background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 8px; overflow: hidden;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .video-card:hover { border-color: #cc0000; box-shadow: 0 0 0 1px #cc000033; }

    .video-thumb {
      position: relative; width: 100%; aspect-ratio: 16 / 9;
      background: #0a0a10; overflow: hidden; flex-shrink: 0;
    }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .live-badge, .shorts-badge {
      position: absolute; top: 6px; left: 6px;
      color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
    }
    .live-badge   { background: #dc2626; letter-spacing: 0.05em; }
    .shorts-badge { background: #2563eb; }

    .video-info { padding: 10px 10px 6px; flex: 1; }
    .video-title {
      font-size: 13px; font-weight: 600; color: #e0e0e0; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 4px;
    }
    .video-meta { font-size: 11px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ===== Twitch channel grid ===== */
    .tw-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .tw-card {
      background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px;
      transition: border-color 0.12s;
    }
    .tw-card:hover { border-color: #6441a5; }

    .tw-card-inner { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

    .tw-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    .tw-name { font-size: 13px; font-weight: 600; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tw-platform { font-size: 11px; color: #6441a5; margin-top: 2px; }

    .tw-actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

    .btn-vod {
      display: inline-block;
      padding: 3px 10px; font-size: 11px; font-weight: 700;
      background: #1a102a; color: #a78bfa;
      border: 1px solid #6441a5; border-radius: 4px;
      cursor: pointer; text-decoration: none;
      transition: background 0.1s; white-space: nowrap;
    }
    .btn-vod:hover { background: #6441a5; color: #fff; }

    /* ===== Twitch VOD section ===== */
    .tw-vod-box {
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tw-section-label {
      font-size: 11px; font-weight: 700;
      color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em;
    }

    .tw-vod-panel-row { display: flex; gap: 4px; align-items: center; }

    .tw-vod-hint { font-size: 11px; color: #374151; line-height: 1.5; }

    .tw-favorites-label {
      font-size: 11px; font-weight: 700;
      color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* ===== Panel buttons (shared) ===== */
    .video-panel-row {
      display: flex; gap: 5px; padding: 6px 10px 10px; align-items: center;
    }

    .panel-label { font-size: 11px; color: #4b5563; margin-right: 2px; white-space: nowrap; flex-shrink: 0; }

    .btn-panel {
      padding: 4px 11px; font-size: 12px; font-weight: 700;
      background: #1e3a5f; color: #93c5fd; border: 1px solid #2563eb; border-radius: 4px;
      cursor: pointer; transition: background 0.1s; flex-shrink: 0;
    }
    .btn-panel:hover { background: #2563eb; color: #fff; }

    /* ===== Pagination (YouTube) ===== */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 20px 0 8px;
    }

    .btn-page {
      padding: 7px 18px; font-size: 13px; font-weight: 600;
      background: #1a1a2a; color: #c4b5fd; border: 1px solid #3a3a5a; border-radius: 6px;
      cursor: pointer; transition: background 0.12s;
    }
    .btn-page:hover:not(:disabled) { background: #2a2a4a; border-color: #7c3aed; }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

    .page-num { font-size: 12px; color: #6b7280; min-width: 60px; text-align: center; }

    /* ===== Toast ===== */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #0a2a0a; border: 1px solid #16a34a; color: #86efac;
      padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 600;
      z-index: 1000; pointer-events: none; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #toast.is-warn { background: #2a1500; border-color: #92400e; color: #fde68a; }

    /* ===== Twitch Auth ===== */
    .tw-auth-section {
      margin-bottom: 12px; padding: 10px 14px;
      background: #13132a; border: 1px solid #2a2a4a; border-radius: 8px;
      font-size: 12px;
    }
    .tw-auth-hint { color: #4b5563; line-height: 1.6; }
    .tw-auth-hint strong { color: #6b7280; }
    .tw-auth-ok   { color: #6ee7b7; display: flex; align-items: center; gap: 8px; }
    .btn-tw-login {
      display: inline-block; padding: 7px 16px; margin-top: 6px;
      background: #6441a5; color: #fff; border-radius: 6px;
      font-size: 12px; font-weight: 700; text-decoration: none; border: none;
      cursor: pointer; transition: background 0.12s;
    }
    .btn-tw-login:hover { background: #7b52c8; }
    .btn-tw-logout {
      padding: 2px 8px; font-size: 11px;
      background: transparent; color: #6b7280;
      border: 1px solid #2a2a3a; border-radius: 4px;
      cursor: pointer; transition: color 0.1s;
    }
    .btn-tw-logout:hover { color: #f87171; border-color: #dc2626; }
    .tw-auth-redirect { font-size: 10px; color: #374151; margin-top: 5px; word-break: break-all; }
    .tw-auth-redirect code { color: #6b7280; background: #1a1a2a; padding: 1px 4px; border-radius: 3px; }

    /* ===== Twitch VOD view ===== */
    .tw-vod-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .btn-tw-back {
      padding: 5px 12px; font-size: 12px; font-weight: 600;
      background: #1a1a2a; color: #c4b5fd;
      border: 1px solid #3a3a5a; border-radius: 6px;
      cursor: pointer; transition: background 0.12s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-tw-back:hover { background: #2a2a4a; }
    .tw-vod-ch-name { font-size: 14px; font-weight: 700; color: #a78bfa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tw-vod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .tw-vod-card {
      display: flex; flex-direction: column;
      background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 8px;
      overflow: hidden; transition: border-color 0.12s;
    }
    .tw-vod-card:hover { border-color: #6441a5; }
    .tw-vod-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: #0a0a10; overflow: hidden; flex-shrink: 0;
    }
    .tw-vod-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tw-vod-dur {
      position: absolute; bottom: 5px; right: 6px;
      background: rgba(0,0,0,0.78); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
    }
    .tw-vod-info { padding: 8px 10px 4px; flex: 1; }
    .tw-vod-title {
      font-size: 12px; font-weight: 600; color: #e0e0e0; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 3px;
    }
    .tw-vod-meta { font-size: 11px; color: #6b7280; }

    /* ===== Responsive ===== */
    @media (max-width: 560px) {
      .tw-vod-grid { grid-template-columns: 1fr; }
      .video-grid { grid-template-columns: 1fr; }
      .video-grid.is-shorts { grid-template-columns: 1fr 1fr; }
      .tw-grid { grid-template-columns: 1fr; }
      h1 { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header class="picker-header">
    <div class="header-title">
      <h1>動画を探す — MultiStream Sync</h1>
      <span id="api-status"></span>
    </div>

    <!-- Platform tabs -->
    <div class="platform-tabs">
      <button class="platform-tab" data-ptab="youtube">YouTube</button>
      <button class="platform-tab" data-ptab="twitch">Twitch</button>
    </div>

    <!-- YouTube controls -->
    <div id="yt-header-controls">
      <div class="search-row">
        <input type="text" id="q" class="search-input" placeholder="キーワードを入力…" autocomplete="off">
        <button class="btn-yt-search" id="btn-search">検索</button>
      </div>
      <div class="chip-row" id="chip-row"></div>
      <!-- YouTube のタブ分類に準拠: 動画 / ライブ中 / アーカイブ / ショート -->
      <div class="filter-row">
        <span class="filter-label">絞り込み:</span>
        <button class="filter-btn" data-filter="video">動画</button>
        <button class="filter-btn" data-filter="live">🔴 ライブ中</button>
        <button class="filter-btn is-active" data-filter="archive">📼 アーカイブ</button>
        <button class="filter-btn" data-filter="short">▶ ショート</button>
      </div>
    </div>

    <!-- Twitch controls -->
    <div id="tw-header-controls" hidden>
      <div class="search-row">
        <input type="text" id="tw-filter" class="search-input"
               placeholder="チャンネル名で絞り込み…" autocomplete="off">
      </div>
      <p class="tw-note">
        ライブ確認が必要な場合は Twitch.tv を確認してください。<br>
        P1〜P4 でライブをパネルに読み込み、VOD URL 入力で録画を送れます。
      </p>
    </div>
  </header>

  <main>
    <!-- ===== YouTube pane ===== -->
    <div id="yt-pane">
      <div id="results"></div>
      <div class="pagination" id="pagination" hidden>
        <button class="btn-page" id="btn-prev" disabled>← 前へ</button>
        <span class="page-num" id="page-num">1 ページ</span>
        <button class="btn-page" id="btn-next" disabled>次へ →</button>
      </div>
    </div>

    <!-- ===== Twitch pane ===== -->
    <div id="tw-pane" hidden>

      <!-- Twitch 認証 -->
      <div class="tw-auth-section" id="tw-auth-section"></div>

      <!-- VOD URL 直接入力（フォールバック） -->
      <div class="tw-vod-box" id="tw-vod-box">
        <div class="tw-section-label">URL で VOD を開く</div>
        <input type="text" id="tw-vod-url" class="search-input"
               placeholder="https://www.twitch.tv/videos/…  または  動画ID"
               autocomplete="off">
        <div class="tw-vod-panel-row">
          <span class="panel-label">パネルへ→</span>
          <button class="btn-panel" data-vod-panel="0">P1</button>
          <button class="btn-panel" data-vod-panel="1">P2</button>
          <button class="btn-panel" data-vod-panel="2">P3</button>
          <button class="btn-panel" data-vod-panel="3">P4</button>
        </div>
      </div>

      <!-- チャンネル一覧ビュー -->
      <div id="tw-channels-view">
        <div class="tw-favorites-label">お気に入りチャンネル</div>
        <div id="tw-results"></div>
      </div>

      <!-- VOD 一覧ビュー（チャンネル選択後） -->
      <div id="tw-vod-view" hidden>
        <div class="tw-vod-header">
          <button class="btn-tw-back" id="btn-tw-back">← チャンネル一覧</button>
          <span class="tw-vod-ch-name" id="tw-vod-ch-name"></span>
        </div>
        <div id="tw-vod-results"></div>
        <div class="pagination" id="tw-vod-pagination" hidden>
          <button class="btn-page" id="btn-tw-prev" disabled>← 前へ</button>
          <span class="page-num" id="tw-page-num">1 ページ</span>
          <button class="btn-page" id="btn-tw-next" disabled>次へ →</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" hidden></div>

  <script>
    const SETTINGS_KEY = 'multi-stream-sync-settings';
    const FAV_KEY      = 'multi-stream-sync-favorites';
    const BC_NAME      = 'mss-picker';
    const PANEL_COUNT  = 4;
    const MAX_RESULTS  = 20;

    let apiKey      = '';
    let ytFavorites = [];
    let twFavorites = [];

    // Twitch OAuth / VOD
    let twClientId         = '';
    let twToken            = null;
    const TW_TOKEN_KEY     = 'mss-tw-token';
    let twVodUsername      = null;
    let twVodUserId        = null;
    let twVodCurrentCursor = null;
    let twVodNextCursor    = null;
    let twVodCursorHistory = [];
    let twVodPage          = 1;

    // ===== State =====
    let activePtab      = 'youtube';
    let activeChannelId = null;
    let activeFilter    = 'archive'; // 'video' | 'live' | 'archive' | 'short'

    // Pagination
    let pageHistory   = [];   // tokens that were used to reach each page (for going back)
    let currentToken  = null; // token used to load the currently displayed page
    let nextPageToken = null; // token for the next page (from API response)
    let currentPage   = 1;

    // ===== Load localStorage =====

    function loadStorage() {
      try {
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
        apiKey     = s.ytApiKey    || '';
        twClientId = s.twClientId  || '';
      } catch {}
      try {
        const f = JSON.parse(localStorage.getItem(FAV_KEY) || '{}');
        ytFavorites = f.youtube || [];
        twFavorites = f.twitch  || [];
      } catch {}
      twToken = localStorage.getItem(TW_TOKEN_KEY) || null;
    }

    // ===== BroadcastChannel =====

    let bc = null;
    function initBC() {
      try { bc = new BroadcastChannel(BC_NAME); } catch {}
    }

    function sendToPanel(videoId, panelIdx, platform = 'youtube') {
      if (bc) {
        bc.postMessage({ type: 'mss-open-video', platform, videoId, panelIdx });
      }
      const plName = platform === 'twitch' ? 'Twitch' : 'YouTube';
      showToast(`${plName} P${panelIdx + 1} に送信しました`);
    }

    // ===== Twitch OAuth & VOD =====

    // OAuth リダイレクト後のトークンをハッシュから取得
    function handleTwOAuth() {
      const hash  = new URLSearchParams(location.hash.slice(1));
      const token = hash.get('access_token');
      if (token) {
        twToken = token;
        localStorage.setItem(TW_TOKEN_KEY, token);
        history.replaceState(null, '', location.pathname + location.search);
        return true; // 新規認証
      }
      return false;
    }

    function renderTwitchAuth() {
      const el = document.getElementById('tw-auth-section');
      if (!el) return;
      if (!twClientId) {
        el.innerHTML =
          `<p class="tw-auth-hint">⚙ ダッシュボードの共通設定で <strong>Twitch Client ID</strong> を設定すると VOD 一覧が使えます。<br>
           <small>dev.twitch.tv でアプリを作成し、リダイレクト URI に <code>${escHtml(location.origin + location.pathname)}</code> を登録してください。</small></p>`;
        return;
      }
      if (twToken) {
        el.innerHTML =
          `<span class="tw-auth-ok">✓ Twitch 認証済み
           <button class="btn-tw-logout" id="btn-tw-logout">ログアウト</button></span>`;
        document.getElementById('btn-tw-logout').addEventListener('click', () => {
          twToken = null;
          localStorage.removeItem(TW_TOKEN_KEY);
          renderTwitchAuth();
          renderTwitchFavorites();
        });
      } else {
        const redirectUri = encodeURIComponent(location.origin + location.pathname);
        const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${encodeURIComponent(twClientId)}&redirect_uri=${redirectUri}&response_type=token&scope=`;
        el.innerHTML =
          `<a href="${authUrl}" class="btn-tw-login">Twitch でログインして VOD 一覧を使う</a>
           <p class="tw-auth-redirect">リダイレクト URI: <code>${escHtml(location.origin + location.pathname)}</code></p>`;
      }
    }

    async function twFetch(path) {
      const res = await fetch('https://api.twitch.tv/helix/' + path, {
        headers: {
          'Authorization': 'Bearer ' + twToken,
          'Client-Id':     twClientId,
        }
      });
      if (res.status === 401) {
        twToken = null;
        localStorage.removeItem(TW_TOKEN_KEY);
        renderTwitchAuth();
        renderTwitchFavorites();
        throw new Error('Twitch 認証が切れました。再ログインしてください');
      }
      if (!res.ok) throw new Error(`Twitch API エラー: HTTP ${res.status}`);
      return res.json();
    }

    // "1h2m3s" → "1:02:03"
    function twDuration(d) {
      const h = Number((d.match(/(\d+)h/) || [0, 0])[1]);
      const m = Number((d.match(/(\d+)m/) || [0, 0])[1]);
      const s = Number((d.match(/(\d+)s/) || [0, 0])[1]);
      if (h) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function twThumb(url) {
      return url ? url.replace('%{width}', '320').replace('%{height}', '180') : '';
    }

    async function twShowVods(username, cursor = null) {
      document.getElementById('tw-channels-view').hidden = true;
      document.getElementById('tw-vod-view').hidden      = false;
      document.getElementById('tw-vod-ch-name').textContent = username;
      document.getElementById('tw-vod-results').innerHTML   = '<p class="loading-text">VOD を取得中…</p>';
      document.getElementById('tw-vod-pagination').hidden   = true;

      twVodCurrentCursor = cursor;

      try {
        if (twVodUsername !== username) {
          const uData = await twFetch(`users?login=${encodeURIComponent(username)}`);
          const user  = uData.data?.[0];
          if (!user) throw new Error(`ユーザー "${username}" が見つかりません`);
          twVodUserId   = user.id;
          twVodUsername = username;
        }

        let path = `videos?user_id=${twVodUserId}&type=archive&first=20`;
        if (cursor) path += `&after=${encodeURIComponent(cursor)}`;

        const data = await twFetch(path);
        twVodNextCursor = data.pagination?.cursor || null;

        renderTwVods(data.data ?? []);

        const pag     = document.getElementById('tw-vod-pagination');
        const hasPrev = twVodCursorHistory.length > 0;
        const hasNext = !!twVodNextCursor;
        pag.hidden = !hasPrev && !hasNext;
        document.getElementById('btn-tw-prev').disabled = !hasPrev;
        document.getElementById('btn-tw-next').disabled = !hasNext;
        document.getElementById('tw-page-num').textContent = `${twVodPage} ページ`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        document.getElementById('tw-vod-results').innerHTML =
          `<div class="error-text">エラー: ${escHtml(err.message)}</div>`;
      }
    }

    function renderTwVods(vods) {
      const container = document.getElementById('tw-vod-results');
      if (!vods.length) {
        container.innerHTML = '<p class="hint-text">VOD が見つかりませんでした</p>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'tw-vod-grid';

      for (const v of vods) {
        const thumb = twThumb(v.thumbnail_url);
        const dur   = twDuration(v.duration || '');

        const panelBtns = Array.from({ length: PANEL_COUNT }, (_, pi) =>
          `<button class="btn-panel" data-tw-vod-url="${escHtml(v.url)}" data-panel="${pi}">P${pi + 1}</button>`
        ).join('');

        const card = document.createElement('div');
        card.className = 'tw-vod-card';
        card.innerHTML = `
          <div class="tw-vod-thumb">
            ${thumb ? `<img src="${escHtml(thumb)}" alt="" loading="lazy">` : ''}
            ${dur    ? `<span class="tw-vod-dur">${escHtml(dur)}</span>` : ''}
          </div>
          <div class="tw-vod-info">
            <div class="tw-vod-title">${escHtml(v.title)}</div>
            <div class="tw-vod-meta">${relativeTime(v.created_at)}</div>
          </div>
          <div class="video-panel-row">
            <span class="panel-label">開く→</span>
            ${panelBtns}
          </div>`;
        grid.appendChild(card);
      }
      container.innerHTML = '';
      container.appendChild(grid);
    }

    // ===== Platform tab switching =====

    function switchTab(ptab) {
      activePtab = ptab;
      document.querySelectorAll('.platform-tab').forEach(btn =>
        btn.classList.toggle('is-active', btn.dataset.ptab === ptab)
      );
      document.getElementById('yt-header-controls').hidden = (ptab !== 'youtube');
      document.getElementById('tw-header-controls').hidden = (ptab !== 'twitch');
      document.getElementById('yt-pane').hidden = (ptab !== 'youtube');
      document.getElementById('tw-pane').hidden = (ptab !== 'twitch');
      if (ptab === 'twitch') { renderTwitchAuth(); renderTwitchFavorites(); }
    }

    document.querySelectorAll('.platform-tab').forEach(btn =>
      btn.addEventListener('click', () => switchTab(btn.dataset.ptab))
    );

    // ===== YouTube channel chips =====

    function renderChips() {
      const row = document.getElementById('chip-row');
      row.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.className = 'chip chip-all' + (activeChannelId === null ? ' is-active' : '');
      allBtn.textContent = 'すべて';
      allBtn.addEventListener('click', () => {
        if (activeChannelId === null) return;
        activeChannelId = null;
        renderChips();
        resetAndSearch();
      });
      row.appendChild(allBtn);

      for (const ch of ytFavorites) {
        const btn = document.createElement('button');
        btn.className = 'chip' + (activeChannelId === ch.channelId ? ' is-active' : '');
        if (ch.thumbnailUrl) {
          const img = document.createElement('img');
          img.className = 'chip-avatar';
          img.src = ch.thumbnailUrl;
          img.alt = '';
          btn.appendChild(img);
        }
        btn.appendChild(document.createTextNode(ch.name));
        btn.addEventListener('click', () => {
          if (activeChannelId === ch.channelId) return;
          activeChannelId = ch.channelId;
          renderChips();
          resetAndSearch();
        });
        row.appendChild(btn);
      }
    }

    // ===== YouTube filter buttons =====

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.filter === activeFilter) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        activeFilter = btn.dataset.filter;
        resetAndSearch();
      });
    });

    // ===== Twitch favorites rendering =====

    function renderTwitchFavorites() {
      const q = document.getElementById('tw-filter').value.toLowerCase().trim();
      const channels = q
        ? twFavorites.filter(ch => ch.username.toLowerCase().includes(q))

          <div class="tw-card-inner">

            <div>
              <div class="tw-name">${escHtml(ch.username)}</div>
              <div class="tw-platform">Twitch</div>
            </div>
          </div>
          <div class="tw-actions">
            <span class="panel-label">開く→</span>
            ${panelBtns}
            ${vodBtn}
          </div>`;

      container.innerHTML = '';
      container.appendChild(grid);
    }

    document.getElementById('tw-filter').addEventListener('input', renderTwitchFavorites);

    // Twitch チャンネル一覧: ライブ開くボタン & VOD一覧ボタン
    document.getElementById('tw-results').addEventListener('click', e => {
      const panelBtn = e.target.closest('.btn-panel[data-tw-user]');
      if (panelBtn) {
        sendToPanel(panelBtn.dataset.twUser, Number(panelBtn.dataset.panel), 'twitch');
        return;
      }
      const vodBtn = e.target.closest('.btn-tw-vod-list');
      if (vodBtn) {
        twVodCursorHistory = [];
        twVodCurrentCursor = null;
        twVodNextCursor    = null;
        twVodPage          = 1;
        twVodUsername      = null; // 別チャンネルへの遷移時に user_id を再取得させる
        twShowVods(vodBtn.dataset.twVodUser);
      }
    });

    // Twitch VOD 一覧: パネルボタン
    document.getElementById('tw-vod-results').addEventListener('click', e => {
      const btn = e.target.closest('.btn-panel[data-tw-vod-url]');
      if (!btn) return;
      sendToPanel(btn.dataset.twVodUrl, Number(btn.dataset.panel), 'twitch');
    });

    // チャンネル一覧に戻る
    document.getElementById('btn-tw-back').addEventListener('click', () => {
      document.getElementById('tw-vod-view').hidden      = true;
      document.getElementById('tw-channels-view').hidden = false;
      twVodCursorHistory = [];
      twVodCurrentCursor = null;
      twVodNextCursor    = null;
      twVodPage          = 1;
    });

    // VOD ページネーション
    document.getElementById('btn-tw-next').addEventListener('click', () => {
      if (!twVodNextCursor) return;
      twVodCursorHistory.push(twVodCurrentCursor);
      twVodPage++;
      twShowVods(twVodUsername, twVodNextCursor);
    });

    document.getElementById('btn-tw-prev').addEventListener('click', () => {
      if (!twVodCursorHistory.length) return;
      const prev = twVodCursorHistory.pop();
      twVodPage--;
      twShowVods(twVodUsername, prev);
    });

    // Twitch VOD: URL input → parse → send
    document.getElementById('tw-pane').addEventListener('click', e => {
      const btn = e.target.closest('.btn-panel[data-vod-panel]');
      if (!btn) return;

      const raw = document.getElementById('tw-vod-url').value.trim();
      if (!raw) { showToast('VOD URL または動画 ID を入力してください', 'warn'); return; }

      const vodUrl = normalizeTwitchVodUrl(raw);
      if (!vodUrl) { showToast('有効な Twitch VOD URL を入力してください', 'warn'); return; }

      sendToPanel(vodUrl, Number(btn.dataset.vodPanel), 'twitch');
    });

    // Twitch VOD URL の正規化（https://www.twitch.tv/videos/XXXXXXXX の形式に統一）
    function normalizeTwitchVodUrl(input) {
      const trimmed = input.trim();
      try {
        const u = new URL(trimmed);
        if (u.hostname.includes('twitch.tv')) {
          const parts = u.pathname.split('/').filter(Boolean);
          if (parts[0] === 'videos' && /^\d+$/.test(parts[1])) {
            return `https://www.twitch.tv/videos/${parts[1]}`;
          }
        }
      } catch {}
      // 数字のみ → 動画 ID として扱う
      if (/^\d{6,}$/.test(trimmed)) {
        return `https://www.twitch.tv/videos/${trimmed}`;
      }
      return null;
    }

    // ===== Utilities =====

    function relativeTime(isoStr) {
      const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (diff < 60)      return `${diff}秒前`;
      if (diff < 3600)    return `${Math.floor(diff / 60)}分前`;
      if (diff < 86400)   return `${Math.floor(diff / 3600)}時間前`;
      if (diff < 2592000) return `${Math.floor(diff / 86400)}日前`;
      return `${Math.floor(diff / 2592000)}ヶ月前`;
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
      );
    }

    // ===== Pagination helpers =====

    function resetPagination() {
      pageHistory   = [];
      currentToken  = null;
      nextPageToken = null;
      currentPage   = 1;
    }

    function updatePaginationUI() {
      const pag     = document.getElementById('pagination');
      const hasPrev = pageHistory.length > 0;
      const hasNext = nextPageToken !== null;
      pag.hidden = !hasPrev && !hasNext;
      document.getElementById('btn-prev').disabled = !hasPrev;
      document.getElementById('btn-next').disabled = !hasNext;
      document.getElementById('page-num').textContent = `${currentPage} ページ`;
    }

    function resetAndSearch() {
      resetPagination();
      doSearch(null);
    }

    // ===== YouTube API search =====

    // チャンネル選択 + アーカイブ/動画フィルター:
    // search.list は検索インデックス依存で取得漏れが多いため
    // playlistItems.list（アップロード一覧）+ videos.list で完全取得する
    async function doSearchByPlaylist(pageToken) {
      const uploadsId = 'UU' + activeChannelId.slice(2);

      const plUrl = new URL('https://www.googleapis.com/youtube/v3/playlistItems');
      plUrl.searchParams.set('part',       'contentDetails');
      plUrl.searchParams.set('playlistId', uploadsId);
      plUrl.searchParams.set('maxResults', String(MAX_RESULTS));
      plUrl.searchParams.set('key',        apiKey);
      if (pageToken) plUrl.searchParams.set('pageToken', pageToken);

      const plRes = await fetch(plUrl);
      if (plRes.status === 403) throw new Error('API キーが無効または quota 超過です');
      if (!plRes.ok)            throw new Error(`HTTP ${plRes.status}`);
      const plData = await plRes.json();

      const videoIds = (plData.items ?? []).map(i => i.contentDetails.videoId);
      if (!videoIds.length) {
        nextPageToken = plData.nextPageToken || null;
        currentToken  = pageToken;
        renderResults([]);
        updatePaginationUI();
        return;
      }

      // videos.list でライブ配信情報を取得してフィルタリング
      const vUrl = new URL('https://www.googleapis.com/youtube/v3/videos');
      vUrl.searchParams.set('part', 'snippet,liveStreamingDetails');
      vUrl.searchParams.set('id',   videoIds.join(','));
      vUrl.searchParams.set('key',  apiKey);

      const vRes = await fetch(vUrl);
      if (!vRes.ok) throw new Error(`HTTP ${vRes.status}`);
      const vData = await vRes.json();

      let filtered = vData.items ?? [];
      if (activeFilter === 'archive') {
        filtered = filtered.filter(v => v.liveStreamingDetails?.actualEndTime);
      } else {
        // 'video': 通常アップロード（ライブ配信ではないもの）
        filtered = filtered.filter(v => !v.liveStreamingDetails);
      }

      // search.list と同じ形式に正規化して renderResults を共通利用
      const items = filtered.map(v => ({
        id: { videoId: v.id },
        snippet: {
          title:               v.snippet.title,
          thumbnails:          v.snippet.thumbnails,
          publishedAt:         v.snippet.publishedAt,
          channelTitle:        v.snippet.channelTitle,
          liveBroadcastContent: 'none',
        }
      }));

      nextPageToken = plData.nextPageToken || null;
      currentToken  = pageToken;

      renderResults(items);
      updatePaginationUI();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function doSearch(pageToken) {
      if (!apiKey) { showApiWarning(); return; }

      const q = document.getElementById('q').value.trim();

      // 動画・ショートはチャンネルかキーワードが必要
      if ((activeFilter === 'video' || activeFilter === 'short') && !q && !activeChannelId) {
        document.getElementById('results').innerHTML =
          '<p class="hint-text">キーワードを入力するか、チャンネルチップを選んでください</p>';
        document.getElementById('pagination').hidden = true;
        return;
      }

      const btn = document.getElementById('btn-search');
      btn.disabled    = true;
      btn.textContent = '検索中…';
      document.getElementById('results').innerHTML = '<p class="loading-text">検索中…</p>';
      document.getElementById('pagination').hidden = true;

      try {
        // チャンネル選択済み + アーカイブ/動画 → playlistItems で完全取得
        if (activeChannelId && (activeFilter === 'archive' || activeFilter === 'video')) {
          await doSearchByPlaylist(pageToken);
          return;
        }

        const url = new URL('https://www.googleapis.com/youtube/v3/search');
        url.searchParams.set('part',       'snippet');
        url.searchParams.set('type',       'video');
        url.searchParams.set('maxResults', String(MAX_RESULTS));
        url.searchParams.set('key',        apiKey);

        // ページトークン（2ページ目以降）
        if (pageToken) url.searchParams.set('pageToken', pageToken);

        // チャンネルチップ選択: そのチャンネルを date 順（新しい順）で取得
        if (activeChannelId) {
          url.searchParams.set('channelId', activeChannelId);
          url.searchParams.set('order',     'date');
          if (q) url.searchParams.set('q', q);
        } else if (q) {
          url.searchParams.set('q',     q);
          url.searchParams.set('order', 'relevance');
        } else {
          // ライブ中・アーカイブのグローバル検索
          url.searchParams.set('order', 'viewCount');
        }

        // 絞り込みフィルター（YouTube タブ分類準拠）
        switch (activeFilter) {
          case 'video':
            break;
          case 'live':
            url.searchParams.set('eventType', 'live');
            break;
          case 'archive':
            url.searchParams.set('eventType', 'completed');
            break;
          case 'short':
            url.searchParams.set('videoDuration', 'short');
            break;
        }

        const res = await fetch(url);
        if (res.status === 403) throw new Error('API キーが無効または quota 超過です');
        if (!res.ok)            throw new Error(`HTTP ${res.status}`);

        const data    = await res.json();
        nextPageToken = data.nextPageToken || null;
        currentToken  = pageToken;

        renderResults(data.items || []);
        updatePaginationUI();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        document.getElementById('results').innerHTML =
          `<div class="error-text">検索エラー: ${escHtml(err.message)}</div>`;
        nextPageToken = null;
        updatePaginationUI();
      } finally {
        btn.disabled    = false;
        btn.textContent = '検索';
      }
    }

    // ===== YouTube result rendering =====

    function renderResults(items) {
      const container = document.getElementById('results');
      if (!items.length) {
        container.innerHTML = '<p class="hint-text">結果が見つかりませんでした</p>';
        return;
      }

      const isShorts = (activeFilter === 'short');
      const grid = document.createElement('div');
      grid.className = 'video-grid' + (isShorts ? ' is-shorts' : '');

      for (const item of items) {
        const videoId = item.id?.videoId;
        if (!videoId) continue;

        const sn     = item.snippet;
        const thumb  = sn.thumbnails?.medium?.url || sn.thumbnails?.default?.url || '';
        const isLive = sn.liveBroadcastContent === 'live';
        const meta   = escHtml(sn.channelTitle) + (isLive ? '' : ' · ' + relativeTime(sn.publishedAt));

        const badge = isLive
          ? '<span class="live-badge">LIVE</span>'
          : isShorts ? '<span class="shorts-badge">Shorts</span>' : '';

        const panelBtns = Array.from({ length: PANEL_COUNT }, (_, pi) =>
          `<button class="btn-panel" data-video-id="${escHtml(videoId)}" data-panel="${pi}">P${pi + 1}</button>`
        ).join('');

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="video-thumb">
            ${thumb ? `<img src="${escHtml(thumb)}" alt="" loading="lazy">` : ''}
            ${badge}
          </div>
          <div class="video-info">
            <div class="video-title">${escHtml(sn.title)}</div>
            <div class="video-meta">${meta}</div>
          </div>
          <div class="video-panel-row">
            <span class="panel-label">開く→</span>
            ${panelBtns}
          </div>`;
        grid.appendChild(card);
      }

      container.innerHTML = '';
      container.appendChild(grid);
    }

    function showApiWarning() {
      document.getElementById('results').innerHTML = `
        <div class="api-warning">
          YouTube API Key が設定されていません。<br>
          ダッシュボードの <strong>⚙ 共通設定</strong> から
          <code>YouTube API Key</code> を入力して保存してから、このページを開き直してください。
        </div>`;
    }

    // ===== Toast =====

    let toastTimer = null;
    function showToast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className   = type === 'warn' ? 'is-warn' : '';
      el.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.hidden = true; }, 2500);
    }

    // ===== Pagination buttons =====

    document.getElementById('btn-next').addEventListener('click', () => {
      if (!nextPageToken) return;
      pageHistory.push(currentToken); // 現在のページのトークンを履歴に積む
      currentPage++;
      doSearch(nextPageToken);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (!pageHistory.length) return;
      const prevToken = pageHistory.pop();
      currentPage--;
      doSearch(prevToken);
    });

    // ===== YouTube event wiring =====

    document.getElementById('btn-search').addEventListener('click', resetAndSearch);
    document.getElementById('q').addEventListener('keydown', e => {
      if (e.key === 'Enter') resetAndSearch();
    });

    // YouTube 動画パネルボタン（イベント委譲）
    document.getElementById('results').addEventListener('click', e => {
      const btn = e.target.closest('.btn-panel[data-video-id]');
      if (!btn) return;
      sendToPanel(btn.dataset.videoId, Number(btn.dataset.panel), 'youtube');
    });

    // ===== Init =====

    loadStorage();
    const _justAuthed = handleTwOAuth(); // OAuth リダイレクト後のトークン取得（URL クリーン前に実行）
    initBC();

    // OAuth 直後は Twitch タブを優先、それ以外は URL パラメータ
    const initTab = _justAuthed ? 'twitch' : (new URLSearchParams(location.search).get('tab') || 'youtube');
    switchTab(initTab);
    renderChips();

    const statusEl = document.getElementById('api-status');
    if (apiKey) {
      statusEl.textContent = '✓ API Key あり';
      statusEl.className = 'ok';
      // YouTube タブ初期表示時: ライブ中を自動検索
      if (initTab === 'youtube') doSearch(null);
    } else {
      statusEl.textContent = '⚠ API Key 未設定';
      statusEl.className = 'err';
      if (initTab === 'youtube') showApiWarning();
    }
  </script>
</body>
</html>
