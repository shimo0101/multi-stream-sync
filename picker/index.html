<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画を探す — MultiStream Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* ===== Sticky header ===== */
    .picker-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
      padding: 12px 16px 10px;
    }

    .header-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.02em;
    }

    #api-status {
      font-size: 11px;
      color: #6b7280;
    }
    #api-status.ok  { color: #4ade80; }
    #api-status.err { color: #f87171; }

    /* ===== Platform tabs ===== */
    .platform-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid #3a3a5a;
      width: fit-content;
    }

    .platform-tab {
      padding: 6px 20px;
      background: transparent;
      border: none;
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.12s;
    }
    .platform-tab:hover { color: #c4b5fd; background: #1a1a2a; }
    .platform-tab[data-ptab="youtube"].is-active { background: #cc0000; color: #fff; }
    .platform-tab[data-ptab="twitch"].is-active  { background: #6441a5; color: #fff; }

    /* ===== Search row ===== */
    .search-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      background: #1a1a2a;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-size: 14px;
      transition: border-color 0.12s;
    }
    .search-input:focus { outline: none; }
    #q:focus          { border-color: #cc0000; }
    #tw-filter:focus  { border-color: #6441a5; }

    .btn-search-yt {
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btn-search-yt:hover:not(:disabled) { background: #aa0000; }
    .btn-search-yt:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Channel filter chips (YouTube) ===== */
    .chip-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: #1a1a2a;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      font-size: 12px;
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .chip:hover { background: #2a2a3a; color: #e0e0e0; }
    .chip.is-active { background: #2a0a0a; border-color: #cc0000; color: #fca5a5; }
    .chip-all.is-active { background: #0a2a0a; border-color: #16a34a; color: #86efac; }

    .chip-avatar {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* ===== Video type filter row (YouTube) ===== */
    .filter-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e1e2a;
    }

    .filter-label {
      font-size: 11px;
      color: #4b5563;
      white-space: nowrap;
      margin-right: 2px;
    }

    .filter-btn {
      padding: 3px 11px;
      background: #1a1a2a;
      border: 1px solid #3a3a5a;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .filter-btn:hover { background: #2a2a3a; color: #c4b5fd; border-color: #4a4a6a; }
    .filter-btn.is-active                      { background: #1e1a3a; border-color: #7c3aed; color: #c4b5fd; }
    .filter-btn[data-filter="live"].is-active  { background: #2a0a0a; border-color: #dc2626; color: #fca5a5; }
    .filter-btn[data-filter="short"].is-active { background: #0a1a2a; border-color: #2563eb; color: #93c5fd; }

    /* ===== Twitch header note ===== */
    .tw-note {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e1e2a;
      font-size: 11px;
      color: #4b5563;
      line-height: 1.6;
    }

    /* ===== Main content ===== */
    main {
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    .hint-text {
      color: #4b5563;
      font-size: 13px;
      padding: 40px 0;
      text-align: center;
      line-height: 1.8;
    }

    .api-warning {
      background: #1a1500;
      border: 1px solid #854d0e;
      border-radius: 8px;
      padding: 16px 20px;
      color: #fde68a;
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .api-warning code {
      background: #2a2500;
      border: 1px solid #854d0e;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
    }

    .loading-text {
      text-align: center;
      padding: 40px;
      color: #4b5563;
      font-size: 13px;
    }

    .error-text {
      background: #1a0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 13px;
    }

    /* ===== YouTube video grid ===== */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .video-grid.is-shorts {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .video-grid.is-shorts .video-thumb { aspect-ratio: 9 / 16; }

    .video-card {
      background: #1a1a2a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .video-card:hover { border-color: #cc0000; box-shadow: 0 0 0 1px #cc000033; }

    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0a0a10;
      overflow: hidden;
    }
    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .live-badge {
      position: absolute;
      top: 6px; left: 6px;
      background: #dc2626;
      color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .shorts-badge {
      position: absolute;
      top: 6px; left: 6px;
      background: #2563eb;
      color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .video-info { padding: 10px 10px 6px; }
    .video-title {
      font-size: 13px; font-weight: 600;
      color: #e0e0e0;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .video-meta {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ===== Twitch channel grid ===== */
    .tw-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .tw-card {
      background: #1a1a2a;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px;
      transition: border-color 0.12s;
    }
    .tw-card:hover { border-color: #6441a5; }

    .tw-card-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .tw-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    .tw-name {
      font-size: 13px; font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tw-platform { font-size: 11px; color: #6441a5; margin-top: 2px; }

    .tw-actions { display: flex; flex-direction: column; gap: 5px; }
    .tw-panel-row { display: flex; gap: 4px; align-items: center; }

    .btn-vod {
      display: inline-block;
      padding: 3px 10px;
      font-size: 11px; font-weight: 700;
      background: #1a102a;
      color: #a78bfa;
      border: 1px solid #6441a5;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s;
      text-align: center;
    }
    .btn-vod:hover { background: #6441a5; color: #fff; }

    /* ===== Panel buttons (shared) ===== */
    .video-panel-row {
      display: flex;
      gap: 5px;
      padding: 6px 10px 10px;
      align-items: center;
    }

    .panel-label {
      font-size: 11px;
      color: #4b5563;
      margin-right: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-panel {
      padding: 4px 11px;
      font-size: 12px; font-weight: 700;
      background: #1e3a5f;
      color: #93c5fd;
      border: 1px solid #2563eb;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .btn-panel:hover { background: #2563eb; color: #fff; }

    /* ===== Pagination (YouTube) ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 0 8px;
    }

    .btn-page {
      padding: 7px 18px;
      font-size: 13px; font-weight: 600;
      background: #1a1a2a;
      color: #c4b5fd;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-page:hover:not(:disabled) { background: #2a2a4a; border-color: #7c3aed; }
    .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

    .page-num {
      font-size: 12px;
      color: #6b7280;
      min-width: 60px;
      text-align: center;
    }

    /* ===== Toast ===== */
    #toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: #0a2a0a;
      border: 1px solid #16a34a;
      color: #86efac;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* ===== Responsive ===== */
    @media (max-width: 560px) {
      .video-grid { grid-template-columns: 1fr; }
      .video-grid.is-shorts { grid-template-columns: 1fr 1fr; }
      .tw-grid { grid-template-columns: 1fr; }
      h1 { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header class="picker-header">
    <div class="header-title">
      <h1>動画を探す — MultiStream Sync</h1>
      <span id="api-status"></span>
    </div>

    <!-- Platform tabs -->
    <div class="platform-tabs">
      <button class="platform-tab" data-ptab="youtube">YouTube</button>
      <button class="platform-tab" data-ptab="twitch">Twitch</button>
    </div>

    <!-- YouTube controls -->
    <div id="yt-header-controls">
      <div class="search-row">
        <input type="text" id="q" class="search-input" placeholder="キーワードを入力…" autocomplete="off">
        <button class="btn-search-yt" id="btn-search">検索</button>
      </div>
      <div class="chip-row" id="chip-row"></div>
      <div class="filter-row">
        <span class="filter-label">絞り込み:</span>
        <button class="filter-btn" data-filter="all">すべて</button>
        <button class="filter-btn is-active" data-filter="live">🔴 ライブ中</button>
        <button class="filter-btn" data-filter="archive">📼 アーカイブ</button>
        <button class="filter-btn" data-filter="short">▶ ショート</button>
      </div>
    </div>

    <!-- Twitch controls -->
    <div id="tw-header-controls" hidden>
      <div class="search-row">
        <input type="text" id="tw-filter" class="search-input"
               placeholder="お気に入りチャンネルを絞り込み…" autocomplete="off">
      </div>
      <p class="tw-note">
        ライブ確認が必要な場合は Twitch.tv を開いてください。<br>
        P1〜P4 ボタンでチャンネルをパネルに読み込みます。
      </p>
    </div>
  </header>

  <main>
    <!-- YouTube pane -->
    <div id="yt-pane">
      <div id="results"></div>
      <div class="pagination" id="pagination" hidden>
        <button class="btn-page" id="btn-prev" disabled>← 前へ</button>
        <span class="page-num" id="page-num">1 ページ</span>
        <button class="btn-page" id="btn-next" disabled>次へ →</button>
      </div>
    </div>
    <!-- Twitch pane -->
    <div id="tw-pane" hidden>
      <div id="tw-results"></div>
    </div>
  </main>

  <div id="toast" hidden></div>

  <script>
    const SETTINGS_KEY = 'multi-stream-sync-settings';
    const FAV_KEY      = 'multi-stream-sync-favorites';
    const BC_NAME      = 'mss-picker';
    const PANEL_COUNT  = 4;

    let apiKey       = '';
    let ytFavorites  = [];
    let twFavorites  = [];

    // ===== Tab state =====
    let activePtab      = 'youtube';
    let activeChannelId = null;
    let activeFilter    = 'live';

    // ===== Pagination state =====
    let pageHistory   = [];
    let currentToken  = null;
    let nextPageToken = null;
    let currentPage   = 1;

    // ===== Load from localStorage =====

    function loadStorage() {
      try {
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
        apiKey = s.ytApiKey || '';
      } catch {}
      try {
        const f = JSON.parse(localStorage.getItem(FAV_KEY) || '{}');
        ytFavorites = f.youtube || [];
        twFavorites = f.twitch  || [];
      } catch {}
    }

    // ===== BroadcastChannel =====

    let bc = null;
    function initBC() {
      try { bc = new BroadcastChannel(BC_NAME); } catch {}
    }

    function sendToPanel(videoId, panelIdx, platform = 'youtube') {
      if (bc) {
        bc.postMessage({ type: 'mss-open-video', platform, videoId, panelIdx });
      }
      const plName = platform === 'twitch' ? 'Twitch' : 'YouTube';
      showToast(`${plName} P${panelIdx + 1} に送信しました`);
    }

    // ===== Platform tab switching =====

    function switchTab(ptab) {
      activePtab = ptab;
      document.querySelectorAll('.platform-tab').forEach(btn => {
        btn.classList.toggle('is-active', btn.dataset.ptab === ptab);
      });
      document.getElementById('yt-header-controls').hidden = (ptab !== 'youtube');
      document.getElementById('tw-header-controls').hidden = (ptab !== 'twitch');
      document.getElementById('yt-pane').hidden = (ptab !== 'youtube');
      document.getElementById('tw-pane').hidden = (ptab !== 'twitch');

      if (ptab === 'twitch') renderTwitchFavorites();
    }

    document.querySelectorAll('.platform-tab').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.ptab));
    });

    // ===== YouTube channel chips =====

    function renderChips() {
      const row = document.getElementById('chip-row');
      row.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.className = 'chip chip-all' + (activeChannelId === null ? ' is-active' : '');
      allBtn.textContent = 'すべて';
      allBtn.addEventListener('click', () => {
        if (activeChannelId === null) return;
        activeChannelId = null;
        renderChips();
        resetAndSearch();
      });
      row.appendChild(allBtn);

      for (const ch of ytFavorites) {
        const btn = document.createElement('button');
        btn.className = 'chip' + (activeChannelId === ch.channelId ? ' is-active' : '');
        if (ch.thumbnailUrl) {
          const img = document.createElement('img');
          img.className = 'chip-avatar';
          img.src = ch.thumbnailUrl;
          img.alt = '';
          btn.appendChild(img);
        }
        btn.appendChild(document.createTextNode(ch.name));
        btn.addEventListener('click', () => {
          if (activeChannelId === ch.channelId) return;
          activeChannelId = ch.channelId;
          renderChips();
          resetAndSearch();
        });
        row.appendChild(btn);
      }
    }

    // ===== YouTube filter buttons =====

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.filter === activeFilter) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        activeFilter = btn.dataset.filter;
        resetAndSearch();
      });
    });

    // ===== Twitch favorites rendering =====

    function renderTwitchFavorites() {
      const q = document.getElementById('tw-filter').value.toLowerCase().trim();
      const channels = q
        ? twFavorites.filter(ch => ch.username.toLowerCase().includes(q))
        : twFavorites;

      const container = document.getElementById('tw-results');
      if (!channels.length) {
        container.innerHTML = q
          ? '<p class="hint-text">一致するチャンネルがありません</p>'
          : '<p class="hint-text">お気に入り Twitch チャンネルがありません<br>' +
            '<small style="color:#374151">ダッシュボードのチャンネルブラウザから追加できます</small></p>';
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'tw-grid';

      for (const ch of channels) {
        const initial = ch.username[0].toUpperCase();
        const panelBtns = Array.from({ length: PANEL_COUNT }, (_, pi) =>
          `<button class="btn-panel" data-tw-user="${escHtml(ch.username)}" data-panel="${pi}">P${pi + 1}</button>`
        ).join('');

        const card = document.createElement('div');
        card.className = 'tw-card';
        card.innerHTML = `
          <div class="tw-card-inner">
            <div class="tw-avatar" style="background:#6441a5">${escHtml(initial)}</div>
            <div class="tw-info">
              <div class="tw-name">${escHtml(ch.username)}</div>
              <div class="tw-platform">Twitch</div>
            </div>
          </div>
          <div class="tw-actions">
            <div class="tw-panel-row">
              <span class="panel-label">開く→</span>
              ${panelBtns}
            </div>
            <a class="btn-vod"
               href="https://www.twitch.tv/${escHtml(ch.username)}/videos"
               target="_blank" rel="noopener noreferrer">VOD ↗</a>
          </div>`;

        grid.appendChild(card);
      }

      container.innerHTML = '';
      container.appendChild(grid);
    }

    document.getElementById('tw-filter').addEventListener('input', renderTwitchFavorites);

    // Twitch panel button clicks
    document.getElementById('tw-results').addEventListener('click', e => {
      const btn = e.target.closest('.btn-panel[data-tw-user]');
      if (!btn) return;
      sendToPanel(btn.dataset.twUser, Number(btn.dataset.panel), 'twitch');
    });

    // ===== Utilities =====

    function relativeTime(isoStr) {
      const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (diff < 60)      return `${diff}秒前`;
      if (diff < 3600)    return `${Math.floor(diff / 60)}分前`;
      if (diff < 86400)   return `${Math.floor(diff / 3600)}時間前`;
      if (diff < 2592000) return `${Math.floor(diff / 86400)}日前`;
      return `${Math.floor(diff / 2592000)}ヶ月前`;
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
      );
    }

    // ===== Pagination helpers =====

    function resetPagination() {
      pageHistory   = [];
      currentToken  = null;
      nextPageToken = null;
      currentPage   = 1;
    }

    function updatePaginationUI() {
      const pag     = document.getElementById('pagination');
      const hasPrev = pageHistory.length > 0;
      const hasNext = nextPageToken !== null;
      pag.hidden = !hasPrev && !hasNext;
      document.getElementById('btn-prev').disabled = !hasPrev;
      document.getElementById('btn-next').disabled = !hasNext;
      document.getElementById('page-num').textContent = `${currentPage} ページ`;
    }

    function resetAndSearch() {
      resetPagination();
      doSearch(null);
    }

    // ===== YouTube API search =====

    async function doSearch(pageToken) {
      if (!apiKey) { showApiWarning(); return; }

      const q = document.getElementById('q').value.trim();

      if (activeFilter === 'short' && !q && !activeChannelId) {
        document.getElementById('results').innerHTML =
          '<p class="hint-text">ショートを絞り込むにはキーワードを入力するか、チャンネルを選んでください</p>';
        document.getElementById('pagination').hidden = true;
        return;
      }

      const btn = document.getElementById('btn-search');
      btn.disabled    = true;
      btn.textContent = '検索中…';
      document.getElementById('results').innerHTML = '<p class="loading-text">検索中…</p>';
      document.getElementById('pagination').hidden = true;

      try {
        const url = new URL('https://www.googleapis.com/youtube/v3/search');
        url.searchParams.set('part',       'snippet');
        url.searchParams.set('type',       'video');
        url.searchParams.set('maxResults', '20');
        url.searchParams.set('key',        apiKey);

        if (pageToken) url.searchParams.set('pageToken', pageToken);

        if (activeChannelId) {
          url.searchParams.set('channelId', activeChannelId);
          url.searchParams.set('order', 'date');
          if (q) url.searchParams.set('q', q);
        } else if (q) {
          url.searchParams.set('q',     q);
          url.searchParams.set('order', 'relevance');
        }

        switch (activeFilter) {
          case 'live':
            url.searchParams.set('eventType', 'live');
            if (!activeChannelId && !q) url.searchParams.set('q', ' ');
            break;
          case 'archive':
            url.searchParams.set('eventType', 'completed');
            if (!activeChannelId && !q) url.searchParams.set('q', ' ');
            break;
          case 'short':
            url.searchParams.set('videoDuration', 'short');
            break;
        }

        const res = await fetch(url);
        if (res.status === 403) throw new Error('API キーが無効または quota 超過です');
        if (!res.ok)            throw new Error(`HTTP ${res.status}`);

        const data    = await res.json();
        nextPageToken = data.nextPageToken || null;
        currentToken  = pageToken;

        renderResults(data.items || []);
        updatePaginationUI();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        document.getElementById('results').innerHTML =
          `<div class="error-text">検索エラー: ${escHtml(err.message)}</div>`;
        nextPageToken = null;
        updatePaginationUI();
      } finally {
        btn.disabled    = false;
        btn.textContent = '検索';
      }
    }

    function renderResults(items) {
      const container = document.getElementById('results');
      if (!items.length) {
        container.innerHTML = '<p class="hint-text">結果が見つかりませんでした</p>';
        return;
      }

      const isShorts = (activeFilter === 'short');
      const grid = document.createElement('div');
      grid.className = 'video-grid' + (isShorts ? ' is-shorts' : '');

      for (const item of items) {
        const videoId = item.id?.videoId;
        if (!videoId) continue;

        const sn     = item.snippet;
        const thumb  = sn.thumbnails?.medium?.url || sn.thumbnails?.default?.url || '';
        const isLive = sn.liveBroadcastContent === 'live';
        const meta   = escHtml(sn.channelTitle) + (isLive ? '' : ' · ' + relativeTime(sn.publishedAt));

        const badge = isLive
          ? '<span class="live-badge">LIVE</span>'
          : isShorts ? '<span class="shorts-badge">Shorts</span>' : '';

        const panelBtns = Array.from({ length: PANEL_COUNT }, (_, pi) =>
          `<button class="btn-panel" data-video-id="${escHtml(videoId)}" data-panel="${pi}">P${pi + 1}</button>`
        ).join('');

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="video-thumb">
            ${thumb ? `<img src="${escHtml(thumb)}" alt="" loading="lazy">` : ''}
            ${badge}
          </div>
          <div class="video-info">
            <div class="video-title">${escHtml(sn.title)}</div>
            <div class="video-meta">${meta}</div>
          </div>
          <div class="video-panel-row">
            <span class="panel-label">開く→</span>
            ${panelBtns}
          </div>`;

        grid.appendChild(card);
      }

      container.innerHTML = '';
      container.appendChild(grid);
    }

    function showApiWarning() {
      document.getElementById('results').innerHTML = `
        <div class="api-warning">
          YouTube API Key が設定されていません。<br>
          ダッシュボードの <strong>⚙ 共通設定</strong> から
          <code>YouTube API Key</code> を入力して保存してから、このページを開き直してください。
        </div>`;
    }

    // ===== Toast =====

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.hidden = true; }, 2500);
    }

    // ===== Pagination buttons =====

    document.getElementById('btn-next').addEventListener('click', () => {
      if (!nextPageToken) return;
      pageHistory.push(currentToken);
      currentPage++;
      doSearch(nextPageToken);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (!pageHistory.length) return;
      const prevToken = pageHistory.pop();
      currentPage--;
      doSearch(prevToken);
    });

    // ===== YouTube event wiring =====

    document.getElementById('btn-search').addEventListener('click', resetAndSearch);
    document.getElementById('q').addEventListener('keydown', e => {
      if (e.key === 'Enter') resetAndSearch();
    });

    document.getElementById('results').addEventListener('click', e => {
      const btn = e.target.closest('.btn-panel[data-video-id]');
      if (!btn) return;
      sendToPanel(btn.dataset.videoId, Number(btn.dataset.panel), 'youtube');
    });

    // ===== Init =====

    loadStorage();
    initBC();

    // Determine initial tab from URL param (?tab=twitch)
    const initTab = new URLSearchParams(location.search).get('tab') || 'youtube';
    switchTab(initTab);
    renderChips();

    const statusEl = document.getElementById('api-status');
    if (apiKey) {
      statusEl.textContent = '✓ API Key あり';
      statusEl.className = 'ok';
      if (initTab === 'youtube') doSearch(null);
    } else {
      statusEl.textContent = '⚠ API Key 未設定';
      statusEl.className = 'err';
      if (initTab === 'youtube') showApiWarning();
    }
  </script>
</body>
</html>
